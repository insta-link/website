<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sai Puneeth’s Contact Information</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --pastel-green: #f0fff0;
            --pure-red: #ff4d4d;
            --pastel-red: #ffdad9;
            --locked-gray: #bdc3c7;
            --button-color: #2ecc71;
            --win-blue: #3498db;
            --timer-red: #e74c3c;
        }

        body {
            background-color: var(--pastel-green);
            margin: 0;
            font-family: -apple-system, sans-serif;
            overflow: hidden;
            transition: background-color 1.5s ease;
        }

        .screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; text-align: center; z-index: 10;
            transition: opacity 1.5s ease;
        }

        .hidden { display: none !important; opacity: 0; }

        /* Welcome Card */
        #main-card { border: 5px dotted #2ecc71; background: white; padding: 25px; border-radius: 25px; width: 280px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        
        .btn-wrapper { position: relative; margin-top: 25px; min-height: 60px; }

        .btn-glow {
            position: relative; padding: 16px 35px; background-color: var(--button-color); border: none; border-radius: 50px;
            cursor: pointer; font-weight: 800; color: white; text-transform: uppercase; z-index: 20;
            box-shadow: 0 4px 15px rgba(46, 204, 113, 0.4); animation: glowPulse 2s infinite;
            transition: opacity 1.2s ease;
            opacity: 0; /* Starts hidden for the 5s delay */
        }

        /* Shows after 5 seconds */
        .btn-visible { opacity: 1; }

        .btn-locked { 
            background-color: var(--locked-gray) !important; 
            cursor: not-allowed; 
            animation: none !important; 
            box-shadow: none !important; 
            opacity: 1 !important; /* Always visible if locked */
        }

        .expansion-layer {
            position: absolute; top: 50%; left: 50%; width: 60px; height: 60px;
            background-color: var(--button-color); border-radius: 50%;
            transform: translate(-50%, -50%) scale(0);
            transition: transform 1.8s cubic-bezier(0.4, 0, 0.2, 1), background-color 1.8s ease;
            z-index: 15; pointer-events: none;
        }
        .expansion-layer.active { transform: translate(-50%, -50%) scale(60); background-color: var(--pastel-green); }

        @keyframes glowPulse {
            0% { box-shadow: 0 0 0 0 rgba(46, 204, 113, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(46, 204, 113, 0); }
            100% { box-shadow: 0 0 0 0 rgba(46, 204, 113, 0); }
        }

        .slow-fade { opacity: 0; transition: opacity 1.5s ease, transform 1.5s ease; transform: translateY(10px); }
        .slow-fade.visible { opacity: 1; transform: translateY(0); }

        .popup-wrong {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: white; padding: 40px; border-radius: 30px; box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            z-index: 1000; animation: bigShake 0.6s cubic-bezier(.36,.07,.19,.97) both;
            border: 4px solid var(--pure-red);
        }

        @keyframes bigShake {
            10%, 90% { transform: translate(-50%, -50%) translate3d(-4px, 0, 0); }
            20%, 80% { transform: translate(-50%, -50%) translate3d(8px, 0, 0); }
            30%, 50%, 70% { transform: translate(-50%, -50%) translate3d(-10px, 0, 0); }
            40%, 60% { transform: translate(-50%, -50%) translate3d(10px, 0, 0); }
        }

        .try-again-text { font-size: 0.8rem; color: #95a5a6; margin-top: 15px; font-weight: 500; }
        .timer-display { color: var(--timer-red); font-weight: bold; }

        .line-loader-container { width: 220px; height: 4px; background: rgba(46, 204, 113, 0.1); border-radius: 10px; overflow: hidden; position: relative; margin-top: 25px; }
        .line-loader-fill { position: absolute; width: 35%; height: 100%; background: var(--button-color); animation: lineMove 2.5s infinite ease-in-out; }
        @keyframes lineMove { 0% { left: -40%; } 100% { left: 100%; } }

        input[type="text"] { padding: 12px; border-radius: 12px; border: 2px solid #2ecc71; font-size: 16px; width: 220px; margin-bottom: 15px; outline: none; }
    </style>
</head>
<body>

    <div id="page-welcome" class="screen">
        <div id="main-card">
            <h1>Hi! I’m Sai Puneeth</h1>
            <p>I’m often inactive on Instagram.<br>Call my number if it’s Urgent🚨</p>
        </div>
        <div class="btn-wrapper">
            <div id="expander" class="expansion-layer"></div>
            <button id="contact-btn" class="btn-glow" onclick="handleStartClick()">Contact Information</button>
        </div>
        <div id="start-lockout-msg" class="hidden">
            <div class="try-again-text">Try again after</div>
            <div id="start-timer" class="timer-display" style="font-size: 1.1rem; margin-top: 4px;"></div>
        </div>
    </div>

    <div id="page-question" class="screen hidden">
        <h2 class="slow-fade" id="q-h2">What’s Sai Puneeth’s favorite colour?</h2>
        <div class="slow-fade" id="q-in">
            <input type="text" id="answer-input" placeholder="Type answer here..." oninput="updateSubmitBtn()">
        </div>
        <button id="submit-btn" class="btn-glow btn-locked slow-fade" style="margin-top:0;" onclick="checkAnswer()">Submit Answer</button>
    </div>

    <div id="page-redirect" class="screen hidden">
        <p style="font-size: 1.5rem; font-weight: 800; color: #27ae60; margin: 0;">Redirecting</p>
        <div class="line-loader-container">
            <div class="line-loader-fill"></div>
        </div>
        <div style="font-size: 0.75rem; color: #7f8c8d; margin-top: 12px;">SEC: <span id="redir-sec">5.5</span></div>
    </div>

    <div id="page-lockout" class="screen hidden" style="background-color: var(--pastel-red);">
        <h1 style="color: #c0392b; font-size: 2.5rem;">LOCKED OUT</h1>
        <p style="color: #7f8c8d; font-weight: 600;">ACCESS DENIED FOR SECURITY</p>
        <div id="lockout-timer-big" class="timer-display" style="font-size: 2.2rem; font-weight: 900; margin: 30px 0;"></div>
        <p style="font-size: 0.8rem; color: #a94442; opacity: 0.6;">Auto-returning to home soon...</p>
    </div>

    <script>
        const SNAPCHAT_LINK = "https://t.me/saipuneeth";

        // Initial setup on load
        window.onload = () => {
            const btn = document.getElementById('contact-btn');
            const lockout = getRemainingLockout();

            if (lockout > 0) {
                // If locked, show grey button immediately
                btn.classList.add('btn-locked', 'btn-visible');
                document.getElementById('start-lockout-msg').classList.remove('hidden');
                startGlobalTimer();
            } else {
                // If not locked, wait 5 seconds to show green button
                setTimeout(() => {
                    btn.classList.add('btn-visible');
                }, 5000);
            }
        };

        function showPage(pageId) {
            const screens = document.querySelectorAll('.screen');
            screens.forEach(s => s.style.opacity = "0");
            setTimeout(() => {
                screens.forEach(s => s.classList.add('hidden'));
                const target = document.getElementById(pageId);
                target.classList.remove('hidden');
                setTimeout(() => target.style.opacity = "1", 50);
            }, 800); 
        }

        function handleStartClick() {
            if (getRemainingLockout() > 0) return;
            const btn = document.getElementById('contact-btn');
            const expander = document.getElementById('expander');
            btn.style.opacity = "0";
            expander.classList.add('active');
            setTimeout(() => {
                showPage('page-question');
                setTimeout(() => document.getElementById('q-h2').classList.add('visible'), 200);
                setTimeout(() => document.getElementById('q-in').classList.add('visible'), 600);
                setTimeout(() => document.getElementById('submit-btn').classList.add('visible'), 1000);
            }, 1200); 
        }

        function updateSubmitBtn() {
            const btn = document.getElementById('submit-btn');
            const val = document.getElementById('answer-input').value.trim();
            btn.classList.toggle('btn-locked', val.length === 0);
        }

        function checkAnswer() {
            const val = document.getElementById('answer-input').value.toLowerCase().trim();
            const btn = document.getElementById('submit-btn');
            if (!val || btn.classList.contains('btn-locked')) return;

            if (val === "green") {
                btn.innerText = "CORRECT! 🎉";
                btn.classList.remove('btn-locked');
                btn.style.backgroundColor = "#27ae60";
                localStorage.removeItem('john_attempt_count');
                confetti({ particleCount: 200, spread: 100, origin: { y: 0.6 } });
                setTimeout(() => { showPage('page-redirect'); startRedirectCounter(); }, 4000);
            } else {
                triggerWrongAnswer();
            }
        }

        function triggerWrongAnswer() {
            const popup = document.createElement('div');
            popup.className = 'popup-wrong';
            popup.innerHTML = `<h1 style="color:var(--pure-red); margin:0;">WRONG ANSWER!</h1><p style="margin-top:10px; color:#666;">Security Lock Triggered</p>`;
            document.body.appendChild(popup);

            let attempts = parseInt(localStorage.getItem('john_attempt_count') || 0) + 1;
            localStorage.setItem('john_attempt_count', attempts);

            let duration;
            const HOUR = 60 * 60 * 1000;
            const DAY = 24 * HOUR;
            const WEEK = 7 * DAY;
            const MONTH = 30 * DAY;

            if (attempts === 1) duration = 2 * HOUR;
            else if (attempts === 2) duration = 2 * WEEK;
            else if (attempts === 3) duration = 1 * MONTH;
            else if (attempts === 4) duration = 2 * MONTH;
            else duration = 3 * MONTH;

            localStorage.setItem('john_lockout_time', Date.now() + duration);

            setTimeout(() => {
                popup.style.opacity = "0";
                showPage('page-lockout');
                startGlobalTimer();
                setTimeout(() => { if(!document.getElementById('page-lockout').classList.contains('hidden')) location.reload(); }, 30000);
            }, 2000);
        }

        function startRedirectCounter() {
            let left = 5.5;
            const interval = setInterval(() => {
                left = Math.max(0, left - 0.1);
                const el = document.getElementById('redir-sec');
                if(el) el.innerText = left.toFixed(1);
                if(left <= 0) { clearInterval(interval); window.location.href = SNAPCHAT_LINK; }
            }, 100);
        }

        function getRemainingLockout() {
            const unlock = localStorage.getItem('john_lockout_time');
            return unlock ? unlock - Date.now() : 0;
        }

        function startGlobalTimer() {
            function update() {
                const diff = getRemainingLockout();
                if (diff <= 0) { location.reload(); return; }
                const d = Math.floor(diff / 86400000), h = Math.floor((diff % 86400000) / 3600000);
                const m = Math.floor((diff % 3600000) / 60000), s = Math.floor((diff % 60000) / 1000);
                
                [document.getElementById('start-timer'), document.getElementById('lockout-timer-big')].forEach(el => {
                    if (el) el.innerText = `${d}D ${h}H ${m}M ${s}S`;
                });
                requestAnimationFrame(update);
            }
            update();
        }
    </script>
</body>
</html>
