<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Location Tracking System</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --accent-green: #2ecc71;
            --error-red: #e74c3c;
            --warn-orange: #f39c12;
            --warn-yellow: #f1c40f;
            --deep-black: #000000;
        }

        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: monospace; background: var(--deep-black); color: white; overflow: hidden; }

        /* Stage 1: Ping */
        #landing-screen { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; z-index: 10; }
        #ping-display { font-size: 11px; font-weight: bold; margin-bottom: 5px; transition: color 0.5s; letter-spacing: 1px; min-height: 1.2em; }
        #latency-display { font-size: 9px; color: #444; margin-bottom: 25px; text-transform: uppercase; }
        
        #track-btn { padding: 16px 45px; background: #333; color: #777; border-radius: 50px; border: 1px solid #444; font-weight: bold; cursor: not-allowed; transition: 0.5s; text-transform: uppercase; pointer-events: none; }
        #track-btn.ready { background: var(--accent-green); color: white; cursor: pointer; box-shadow: 0 0 20px var(--accent-green); border: none; pointer-events: auto; }

        #grow-circle { position: fixed; top: 50%; left: 50%; width: 10px; height: 10px; background: var(--deep-black); border-radius: 50%; transform: translate(-50%, -50%) scale(0); transition: 1.2s; z-index: 100; pointer-events: none; }

        /* Stage 2: Animation */
        .screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 200; }
        
        .tracker-row { display: flex; align-items: center; justify-content: center; width: 100%; margin-bottom: 40px; }
        .node-wrapper { width: 60px; height: 60px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 30px; transition: 0.6s; }
        
        .line-box { width: 50px; height: 2px; background: #1a1a1a; position: relative; margin: 0 5px; }
        .line-fill { width: 0%; height: 100%; background: var(--warn-orange); position: absolute; top: 0; left: 0; transition: background 0.4s ease; }
        
        .line-fill.searching { background: var(--warn-orange); box-shadow: 0 0 8px var(--warn-orange); }
        .line-fill.stable { background: var(--accent-green); box-shadow: 0 0 10px var(--accent-green); }
        .line-fill.failed { background: var(--error-red); box-shadow: 0 0 10px var(--error-red); }

        .glow-green { background: rgba(46, 204, 113, 0.2); box-shadow: 0 0 35px var(--accent-green); }
        .glow-orange { background: rgba(243, 156, 18, 0.2); box-shadow: 0 0 35px var(--warn-orange); }
        .glow-red { background: rgba(231, 76, 60, 0.3); box-shadow: 0 0 45px var(--error-red); }

        .pulse-active { animation: activePulse 2s infinite ease-in-out; }
        @keyframes activePulse {
            0% { box-shadow: 0 0 20px var(--accent-green); transform: scale(1); }
            50% { box-shadow: 0 0 45px var(--accent-green); transform: scale(1.05); }
            100% { box-shadow: 0 0 20px var(--accent-green); transform: scale(1); }
        }

        .terminal { width: 85%; max-width: 320px; height: 220px; font-size: 11px; line-height: 1.4; text-align: center; overflow: hidden; }
        .orange { color: var(--warn-orange); }
        .green { color: var(--accent-green); }
        .dim { color: #444; font-size: 9px; }
        .err-title { color: var(--error-red); font-weight: bold; display: block; margin-top: 15px; }
        .err-desc { color: #555; display: block; font-size: 10px; margin-top: 5px; min-height: 40px; }
        .countdown-timer { color: #888; margin-top: 12px; font-size: 10px; letter-spacing: 0.5px; }

        #main-content { background: #e8f5e9; color: black; }
        .glass-card { width: 88%; max-width: 340px; background: white; border-radius: 35px; padding: 25px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); display: flex; flex-direction: column; align-items: center; box-sizing: border-box; }
        #map { width: 100%; height: 180px; border-radius: 20px; margin: 15px 0; border: 1px solid #eee; }
        .footer-status { color: var(--accent-green); font-weight: 900; font-size: 12px; animation: blink 1.5s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }
    </style>
</head>
<body>

    <div id="landing-screen">
        <div id="ping-display">checking internet connection...</div>
        <div id="latency-display">LATENCY: --ms</div>
        <button id="track-btn">Track Location</button>
    </div>
    <div id="grow-circle"></div>

    <div id="enquiry-screen" class="screen">
        <div class="tracker-row">
            <div id="sat-box" class="node-wrapper">🛰️</div>
            <div class="line-box"><div id="l1" class="line-fill"></div></div>
            <div id="tow-box" class="node-wrapper">🗼</div>
            <div class="line-box"><div id="l2" class="line-fill"></div></div>
            <div id="pho-box" class="node-wrapper">📱</div>
        </div>
        <div id="term" class="terminal"></div>
    </div>

    <div id="main-content" class="screen">
        <div class="glass-card">
            <h3 style="margin:0;">Sai Puneeth's Location</h3>
            <div id="map"></div>
            <div class="footer-status">● ACTIVE LOCATION</div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const targetLat = 51.5074;
        const targetLng = -0.1278;
        const zoomLevel = 15;

        if(!localStorage.getItem('weatherSeenAt')) localStorage.setItem('weatherSeenAt', Date.now());

        const pingEl = document.getElementById('ping-display');
        const latEl = document.getElementById('latency-display');
        
        function startLandingSequence() {
            let elapsed = 0;
            const totalDuration = 15000;
            const interval = 1000;

            const landingInt = setInterval(() => {
                elapsed += interval;
                
                const currentLat = Math.floor(Math.random() * 20) + 25;
                latEl.innerText = `LATENCY: ${currentLat}ms`;

                // Color Transition: Red -> Orange -> Yellow -> Green
                if(elapsed <= 4000) {
                    pingEl.style.color = "var(--error-red)";
                } else if (elapsed <= 8000) {
                    pingEl.style.color = "var(--warn-orange)";
                } else if (elapsed < 15000) {
                    pingEl.style.color = "var(--warn-yellow)";
                }

                if(elapsed >= totalDuration) {
                    clearInterval(landingInt);
                    pingEl.innerText = "INTERNET CONNECTION IS STABLE!";
                    pingEl.style.color = "var(--accent-green)";
                    latEl.innerText = "LATENCY: 22ms";
                    
                    const btn = document.getElementById('track-btn');
                    btn.classList.add('ready');
                    btn.onclick = () => {
                        document.getElementById('grow-circle').style.transform = "translate(-50%, -50%) scale(500)";
                        setTimeout(() => {
                            document.getElementById('landing-screen').style.display = 'none';
                            document.getElementById('enquiry-screen').style.display = 'flex';
                            processFlow();
                        }, 1000);
                    };
                }
            }, interval);
        }

        startLandingSequence();

        async function typeText(el, text, speed = 40) {
            el.innerHTML = "";
            for (let i = 0; i < text.length; i++) {
                el.innerHTML += text.charAt(i);
                await wait(speed);
            }
        }

        async function updateTerminalWithType(msgs, duration) {
            const term = document.getElementById('term');
            const step = duration / msgs.length;
            for (let msg of msgs) {
                const div = document.createElement('div');
                div.className = msg.startsWith('>') ? 'orange' : 'dim';
                term.appendChild(div);
                if(term.childNodes.length > 8) term.removeChild(term.firstChild);
                await typeText(div, msg, 20); 
                await wait(step - (msg.length * 20)); 
            }
        }

        async function processFlow() {
            const term = document.getElementById('term');
            const sBox = document.getElementById('sat-box'), tBox = document.getElementById('tow-box'), pBox = document.getElementById('pho-box');
            const l1 = document.getElementById('l1'), l2 = document.getElementById('l2');

            sBox.classList.add('glow-orange');
            l1.classList.add('searching');
            
            const satMsgs = [
                "> UPLINKING TO SATELLITE...",
                "ACCESSING SIGINT CHANNELS",
                "REQUESTING GEO-ENCRYPTION KEYS",
                "> TRIANGULATING COORDINATES...",
                "FILTERING ATMOSPHERIC NOISE",
                "PINGING CELLULAR BACKHAUL",
                "BYPASSING LOCAL FIREWALLS",
                "> ESTABLISHING DOWNLINK PATH..."
            ];
            
            fillLine(l1, 60000, 100);
            await updateTerminalWithType(satMsgs, 60000);
            
            const weatherElapsed = (Date.now() - localStorage.getItem('weatherSeenAt')) / 1000;

            if (weatherElapsed < 7200) {
                tBox.innerHTML = "🌧️";
                tBox.classList.remove('glow-orange');
                tBox.classList.add('glow-red');
                l1.classList.replace('searching', 'failed');
                
                term.innerHTML = `<span class="err-title">FAILOVER: WEATHER INTERFERENCE</span>
                                 <span id="type-weather" class="err-desc"></span>
                                 <div id="live-timer" class="countdown-timer"></div>`;
                
                await typeText(document.getElementById('type-weather'), "Heavy rain detected at target coordinates. Satellite signal cannot penetrate atmospheric density.");
                
                const timerDisplay = document.getElementById('live-timer');
                const updateTimer = () => {
                    const nowElapsed = (Date.now() - localStorage.getItem('weatherSeenAt')) / 1000;
                    const remaining = 7200 - nowElapsed;
                    if (remaining <= 0) {
                        timerDisplay.innerHTML = "RETRY AUTHORIZED. REFRESH PAGE.";
                        return;
                    }
                    const hrs = Math.floor(remaining / 3600);
                    const mins = Math.floor((remaining % 3600) / 60);
                    const secs = Math.floor(remaining % 60);
                    timerDisplay.innerHTML = `TRY AGAIN IN: ${hrs}h ${mins}m ${secs}s`;
                };
                updateTimer();
                setInterval(updateTimer, 1000);
                return;
            }

            l1.classList.replace('searching', 'stable');
            sBox.classList.replace('glow-orange', 'glow-green');
            tBox.classList.add('glow-green', 'pulse-active'); 
            term.innerHTML = `<div class="green">> SATELLITE HANDSHAKE COMPLETE.</div>`;
            await wait(2000);

            if(!localStorage.getItem('phoneSeenAt')) localStorage.setItem('phoneSeenAt', Date.now());
            
            term.innerHTML += `<div class="green">> TOWER CONNECTED.</div>`;
            await wait(2000);
            
            const phoneMsgs = [
                "> LOCATING DEVICE IMEI...",
                "INTERCEPTING HLR PACKETS",
                "CHALLENGING SIM AUTHENTICATION",
                "> DECRYPTING GSM HANDSHAKE...",
                "REQUESTING SILENT SMS PING",
                "WAITING FOR DEVICE BROADCAST"
            ];
            
            l2.classList.add('searching');
            fillLine(l2, 30000, 100);
            await updateTerminalWithType(phoneMsgs, 30000);

            const phoneElapsed = (Date.now() - localStorage.getItem('phoneSeenAt')) / 1000;

            if (phoneElapsed < 86400) {
                pBox.classList.add('glow-red');
                l2.classList.replace('searching', 'failed');
                tBox.classList.remove('pulse-active'); 
                term.innerHTML = `<span class="err-title">ERROR: IPHONE OFFLINE</span><span id="type-phone" class="err-desc"></span>`;
                await typeText(document.getElementById('type-phone'), "No active data packets detected from target device. System is monitoring for the next signal broadcast.");
                return;
            }

            l2.classList.replace('searching', 'stable');
            pBox.classList.add('glow-green');
            term.innerHTML = `<div class="green">> CONNECTION STABLE. DECRYPTING...</div>`;
            await wait(3000);
            
            document.getElementById('enquiry-screen').style.display = 'none';
            document.getElementById('main-content').style.display = 'flex';

            const map = L.map('map', {zoomControl: false, attributionControl: false}).setView([targetLat, targetLng], zoomLevel);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            L.marker([targetLat, targetLng]).addTo(map);
        }

        function fillLine(el, dur, target) {
            el.style.transition = `width ${dur}ms linear`;
            setTimeout(() => el.style.width = target + "%", 50);
        }
        function wait(ms) { return new Promise(r => setTimeout(r, ms)); }
    </script>
</body>
</html>
